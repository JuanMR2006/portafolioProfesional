<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portafolio Grupal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .menu { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 30px; }
        .botones { display: flex; gap: 20px; justify-content: center; }
        .btn { text-decoration: none; padding: 15px 25px; border-radius: 10px; color: white; font-weight: bold; transition: 0.3s; }
        .btn-juan { background: #14532d; }
        .btn-miguel { background: #3498db; }
        .btn-sebas { background: #e74c3c; }
        .btn:hover { opacity: 0.8; transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="menu">
        <h1>Bienvenidos al Portafolio Grupal</h1>
        <div class="botones">
            <a href="/juan/" class="btn btn-juan">Ver CV Juan</a>
            <a href="/miguel/" class="btn btn-miguel">Ver CV Miguel</a>
            <a href="/sebas/" class="btn btn-sebas">Ver CV Sebas</a>
        </div>
    </div>
</body>
</html>
